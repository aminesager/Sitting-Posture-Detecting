
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traitement du Posture</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .navbar {
            background-color: #333;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        
        .navbar ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        
        .navbar li {
            float: left;
        }
        
        .navbar li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        
        .navbar li a:hover {
            background-color: #ddd;
            color: black;
        }
        
        .container {
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
        }
        
        #uploadBtn, #processBtn{
            padding: 10px 20px;
            font-size: 20px;
            font-family: sans-serif;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 40px;
        }

        #processBtn{
            margin-top: 40px;
        }
        
        #uploadBtn:hover {
            background-color: yellow;
            transition: 0.5s;
            color: #0056b3;
        }
        #processBtn:hover {
            background-color: yellow;
            transition: 0.5s;
            color: #0056b3;
        }
        
        #videoContainer {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }
        
        video{
            width: 540px;
            height: auto;
        }
        
        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        
    </style>

</head>
<body>
    <nav class="navbar">
        <nav class="navbar">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </nav>
    <div class="container">
        <button id="uploadBtn">Upload Video</button>
        <input type="file" id="fileInput" style="display: none;">
        <div id="videoContainer"></div>
        <form id="uploadForm" action="/process_video" method="POST">
        <button id="processBtn" type="submit" style="display: none;">Process</button> 
        </form>
    </div>
    <footer class="footer">
        <p>&copy; 2024 VideoUploader. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('uploadBtn').addEventListener('click', function() {
            document.getElementById('fileInput').click();
        });
        
        document.getElementById('fileInput').addEventListener('change', function() {
            var file = this.files[0];
            if (file) {
                var videoContainer = document.getElementById('videoContainer');
                videoContainer.innerHTML = ''; // Clear previous video if any
                var video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                video.controls = true;
                videoContainer.appendChild(video);
                
                document.getElementById('processBtn').style.display = 'inline-block';
            }
        });
        
    </script>

</body>
</html>
